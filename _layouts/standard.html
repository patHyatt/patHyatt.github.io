layout: "compress"

<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
    <script>
      (function(){var t=localStorage.getItem('theme')||'system';document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <style>
      {% capture include_to_sassify %}
        {% include main.sass %}
      {% endcapture %}
      {{ include_to_sassify | sassify }}
    </style>
    {% include schema.html %}
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {% include nav-top.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include nav-bottom.html %}
    {% include analytics.html %}
  </body>
</html>
